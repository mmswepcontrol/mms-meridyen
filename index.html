<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0D0D0D">
<title>404 — Sayfa Bulunamadı | MMS Meridyen</title>
<meta name="description" content="Aradığınız sayfa bulunamadı. MMS Meridyen ana sayfasına dönebilirsiniz.">
<link rel="canonical" href="https://www.mmsmeridyen.tr/">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%239A7235'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='20' fill='%23F0EBE0'%3EM%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gold-d:#9A7235;--black:#0D0D0D;--text:#F0EBE0;--text-m:#8A8070;--ease:.22s cubic-bezier(.4,0,.2,1)}
body{background:var(--black);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100svh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;width:100%}
.mark{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--gold),var(--gold-d));display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-weight:700;font-size:28px;color:#000;margin:0 auto 28px}
h1{font-size:clamp(4rem,15vw,6rem);font-weight:700;color:var(--gold);letter-spacing:-.04em;line-height:1;margin-bottom:4px}
h2{font-size:1.2rem;font-weight:600;margin-bottom:10px}
p{color:var(--text-m);font-size:15px;line-height:1.6;margin-bottom:32px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;border-radius:10px;font-weight:600;font-size:14px;transition:filter var(--ease),transform var(--ease)}
a:hover{transform:translateY(-1px)}
.a-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#000}
.a-gold:hover{filter:brightness(1.1)}
.a-outline{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--text)}
.a-outline:hover{background:rgba(255,255,255,.14)}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:4px}
</style>
</head>
<body>
<main role="main">
  <div class="wrap">
    <div class="mark" aria-hidden="true">M</div>
    <h1>404</h1>
    <h2>Sayfa Bulunamadı</h2>
    <p>Aradığınız sayfa taşınmış veya kaldırılmış olabilir.<br>
       Ana sayfaya dönerek devam edebilirsiniz.</p>
    <div class="btns" role="group" aria-label="Yönlendirme seçenekleri">
      <a href="/" class="a-gold">🏠 Ana Sayfaya Dön</a>
      <a href="tel:+905325060781" class="a-outline">📞 0532 506 07 81</a>
    </div>
  </div>
</main>
</body>
</html>
